<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Content Library</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

h1{
color:#22c55e;
}

.filter button{
padding:8px 12px;
margin:5px;
border:none;
background:#334155;
color:white;
cursor:pointer;
border-radius:5px;
}

.filter button:hover{
background:#22c55e;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:8px;
position:relative;
}

.card h3{
margin:0 0 10px 0;
}

.tag{
font-size:12px;
padding:3px 6px;
background:#334155;
border-radius:4px;
display:inline-block;
margin-bottom:10px;
}

.locked{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
}

.locked button{
background:#ef4444;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
}

.action button{
padding:6px 10px;
margin:5px 5px 0 0;
border:none;
border-radius:5px;
cursor:pointer;
}

.openBtn{background:#22c55e;color:white;}
.downloadBtn{background:#3b82f6;color:white;}

</style>
</head>
<body>

<h1>📚 Content Library</h1>

<div class="filter">
<button onclick="filterContent('all')">All</button>
<button onclick="filterContent('pdf')">PDF</button>
<button onclick="filterContent('video')">Video</button>
<button onclick="filterContent('template')">Template</button>
<button onclick="filterContent('software')">Software</button>
<button onclick="filterContent('worksheet')">Worksheet</button>
</div>

<div class="grid" id="contentBox"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentRole = "guest";
let allContent = [];

firebase.auth().onAuthStateChanged(user=>{

if(user){
db.collection("users").doc(user.uid).get().then(doc=>{
if(doc.exists){
currentRole = doc.data().role;
}
loadContent();
});
}else{
loadContent();
}

});

function loadContent(){
db.collection("content").orderBy("createdAt","desc").get().then(snapshot=>{
allContent=[];
snapshot.forEach(doc=>{
allContent.push(doc.data());
});
displayContent(allContent);
});
}

function displayContent(data){

let box=document.getElementById("contentBox");
box.innerHTML="";

data.forEach(item=>{

let isPremium=item.access==="premium";
let allowed = !isPremium ||
currentRole==="premium" ||
currentRole==="admin" ||
currentRole==="superadmin";

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${item.title}</h3>
<span class="tag">${item.type.toUpperCase()}</span>
<div class="action">
<button class="openBtn" onclick="window.open('${item.fileURL}')">Open</button>
<a href="${item.fileURL}" download>
<button class="downloadBtn">Download</button>
</a>
</div>
`;

if(!allowed){
let lock=document.createElement("div");
lock.className="locked";
lock.innerHTML=`<button>Premium Only</button>`;
card.appendChild(lock);
}

box.appendChild(card);

});

}

function filterContent(type){
if(type==="all"){
displayContent(allContent);
}else{
let filtered=allContent.filter(item=>item.type===type);
displayContent(filtered);
}
}

</script>

</body>
</html>
