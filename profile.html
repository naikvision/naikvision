<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - NaikVision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.profile-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.profile-card img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #22c55e;
margin-bottom:20px;
}

.profile-card h1{
margin-bottom:10px;
font-weight:600;
}

.profile-card h2{
font-weight:400;
color:#cbd5e1;
margin-bottom:25px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg,#ef4444,#dc2626);
color:white;
font-weight:500;
transition:0.3s;
}

.btn:hover{
opacity:0.8;
transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="profile-card">
<h1>My Profile</h1>
<img id="pimg" src="https://via.placeholder.com/130">
<h2 id="name">Loading...</h2>
<button class="btn" onclick="logout()">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(function(user){
if(!user){
location="login.html";
return;
}

let f = localStorage.getItem("fname");
let l = localStorage.getItem("lname");
let p = localStorage.getItem("photo");

if(f && l){
document.getElementById("name").innerHTML = f + " " + l;
}else{
document.getElementById("name").innerHTML = user.email;
}

if(p){
document.getElementById("pimg").src = p;
}
});

function logout(){
firebase.auth().signOut().then(()=>{
localStorage.clear();
location="login.html";
});
}
</script>

</body>
</html>
