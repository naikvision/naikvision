<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<input type="text" id="title" placeholder="Title">
<input type="text" id="description" placeholder="Description">
<button onclick="addData()">Add</button>

<hr>

<div id="dataList"></div>

<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


  const firebaseConfig = {
    apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
    authDomain: "naikvision-login.firebaseapp.com",
    projectId: "naikvision-login",
    storageBucket: "naikvision-login.firebasestorage.app",
    messagingSenderId: "589102069083",
    appId: "1:589102069083:web:ada0fb358af2e11a13567e"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/naikvision/admin.html";
  } else {
    loadData();
  }
});
window.logout = function(){
  signOut(auth).then(() => {
   window.location.href = "/naikvision/index.html";
  });
}

window.addData = async function(){
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;

  await addDoc(collection(db, "posts"), {
    title: title,
    description: description
  });

  alert("Data Added!");
  loadData();
}

async function loadData(){
  const querySnapshot = await getDocs(collection(db, "posts"));
  const dataList = document.getElementById("dataList");
  dataList.innerHTML = "";

  querySnapshot.forEach((doc) => {
    dataList.innerHTML += `
      <p><b>${doc.data().title}</b><br>${doc.data().description}</p>
    `;
  });
}

</script>

</body>
</html>
