<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - NaikVision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#0f172a;
color:white;
padding:30px;
display:none;
}

h1{
margin-bottom:20px;
color:#22c55e;
}

.cardBox{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
margin:2px;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.orange{background:#f97316;color:white;}
.red{background:#ef4444;color:white;}
</style>
</head>

<body>

<h1>🔥 Admin Control Panel</h1>
<button class="red" onclick="logout()">Logout</button>

<hr><br>

<div class="cardBox">
<div class="card">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="card">
<h2 id="totalPremium">0</h2>
<p>Premium Users</p>
</div>

<div class="card">
<h2 id="totalPayments">0</h2>
<p>Pending Payments</p>
</div>
</div>

<h2>👥 User Management</h2>
<table>
<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

<h2>💳 Payment Requests</h2>
<table>
<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="paymentTable"></tbody>
</table>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
authDomain:"naikvision-login.firebaseapp.com",
projectId:"naikvision-login"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{

if(!user){
window.location="login.html";
return;
}

db.collection("users").doc(user.uid).get().then(doc=>{

if(!doc.exists){
window.location="index.html";
return;
}

let role = doc.data().role;

if(role !== "admin" && role !== "superadmin"){
alert("Access Denied");
window.location="dashboard.html";
return;
}

document.body.style.display="block";

loadStats();
loadUsers();
loadPayments();

});

});

function loadStats(){

db.collection("users").get().then(snapshot=>{
let total=0;
let premium=0;

snapshot.forEach(doc=>{
total++;
let role = doc.data().role;
if(role==="pro" || role==="business") premium++;
});

document.getElementById("totalUsers").innerText = total;
document.getElementById("totalPremium").innerText = premium;
});

db.collection("payments").where("status","==","pending")
.get().then(snapshot=>{
document.getElementById("totalPayments").innerText = snapshot.size;
});

}

function loadUsers(){

db.collection("users").get().then(snapshot=>{

let table=document.getElementById("userTable");
table.innerHTML="";

snapshot.forEach(doc=>{
let data=doc.data();

table.innerHTML+=`
<tr>
<td>${data.email}</td>
<td>${data.role}</td>
<td>
<button class="green" onclick="updateRole('${doc.id}','pro')">Pro</button>
<button class="orange" onclick="updateRole('${doc.id}','business')">Business</button>
<button class="blue" onclick="updateRole('${doc.id}','admin')">Admin</button>
</td>
</tr>
`;
});

});

}

function updateRole(uid,newRole){
db.collection("users").doc(uid).update({role:newRole})
.then(()=>{
alert("Role Updated");
loadUsers();
loadStats();
});
}

function loadPayments(){

db.collection("payments").where("status","==","pending")
.get().then(snapshot=>{

let table=document.getElementById("paymentTable");
table.innerHTML="";

snapshot.forEach(doc=>{
let data=doc.data();

table.innerHTML+=`
<tr>
<td>${data.userEmail}</td>
<td>${data.status}</td>
<td>
<button class="green" onclick="approvePayment('${doc.id}','${data.userId}')">Approve</button>
<button class="red" onclick="rejectPayment('${doc.id}')">Reject</button>
</td>
</tr>
`;
});

});

}

function approvePayment(paymentId,userId){

db.collection("users").doc(userId)
.update({role:"pro"});

db.collection("payments").doc(paymentId)
.update({status:"approved"});

alert("Payment Approved & User Upgraded");
loadPayments();
loadStats();
loadUsers();
}

function rejectPayment(paymentId){

db.collection("payments").doc(paymentId)
.update({status:"rejected"});

alert("Payment Rejected");
loadPayments();
}

function logout(){
firebase.auth().signOut().then(()=>{
window.location="login.html";
});
}

</script>

</body>
</html>
