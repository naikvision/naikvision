<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - NaikVision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
display:flex;
background:#0f172a;
color:white;
}

.sidebar{
width:250px;
background:#111827;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
color:#22c55e;
}

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
margin:15px 0;
padding:8px;
border-radius:6px;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:250px;
padding:40px;
width:100%;
}

.cardBox{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.btn{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#22c55e;
color:white;
margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>NaikVision</h2>
<a href="#">🏠 Overview</a>
<a href="content.html">📁 My Content</a>
<a href="#">🎨 Website Builder</a>
<a href="payment.html">💎 Upgrade Plan</a>
<a href="profile.html">👤 Profile</a>
<a href="#" onclick="logout()">🚪 Logout</a>
<a href="admin.html" id="adminLink" style="display:none;">⚙ Admin Panel</a>
</div>

<div class="main">

<h1>Welcome, <span id="userEmail"></span></h1>
<p>Your Role: <strong id="userRole"></strong></p>

<div class="cardBox">

<div class="card">
<h3>Subscription</h3>
<p id="subscriptionStatus">Loading...</p>
</div>

<div class="card">
<h3>Total Downloads</h3>
<p>0</p>
</div>

<div class="card">
<h3>Premium Access</h3>
<p id="premiumStatus">Checking...</p>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

if(!user){
window.location="login.html";
return;
}

document.getElementById("userEmail").innerText = user.email;

db.collection("users").doc(user.uid).get().then(doc => {

if(!doc.exists){
alert("User role not found");
window.location="dashboard.html";;
return;
}

let role = doc.data().role;

document.getElementById("userRole").innerText = role;
document.getElementById("subscriptionStatus").innerText = role.toUpperCase();

if(role === "pro" || role === "business"){
document.getElementById("premiumStatus").innerText = "Active";
}else{
document.getElementById("premiumStatus").innerText = "Not Active";
}

if(role === "admin" || role === "superadmin"){
document.getElementById("adminLink").style.display="block";
}

});

});

function logout(){
firebase.auth().signOut().then(()=>{
window.location="login.html";
});
}
</script>

</body>
</html>
