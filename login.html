<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - NaikVision</title>
<style>
body{background:#0f172a;color:white;text-align:center;font-family:Arial;padding-top:80px;}
.box{background:#1e293b;padding:30px;width:300px;margin:auto;border-radius:10px;}
input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:5px;}
button{width:100%;padding:10px;background:#f97316;color:white;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#ea580c;}
a{color:#38bdf8;text-decoration:none;}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="loginUser()">Login</button>
<br><br>
<a href="signup.html">Create New Account</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login",
  storageBucket: "naikvision-login.appspot.com",
  messagingSenderId: "589102069083",
  appId: "1:589102069083:web:ada0fb358af2e11a13567e"
};

firebase.initializeApp(firebaseConfig);

function loginUser(){
var email = document.getElementById("email").value.trim();
var password = document.getElementById("password").value.trim();

if(email=="" || password==""){
alert("Please fill all fields");
return;
}

firebase.auth().signInWithEmailAndPassword(email,password)
.then(function(){
alert("Login Successful");
window.location="deshboard.html";  // ✅ FIXED
})
.catch(function(error){
alert(error.message);
});
}
</script>
</body>
</html>
