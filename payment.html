<!DOCTYPE html>
<html>
<head>
<title>Payment - NaikVision</title>
<style>
body{
font-family:Arial;

background:#f5f5f5;
padding-top:50px;
}
.box{
background:white;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
cursor:pointer;
}
button:hover{
background:darkgreen;
}
</style>
</head>
<body>

<div class="box">
<h2>Complete Your Payment</h2>

<p>Send Payment To:</p>
<h3 style="color:green;">8766086767@ybl</h3>

<br>
<button onclick="submitPayment()">I Have Paid</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login",
  storageBucket: "naikvision-login.appspot.com",
  messagingSenderId: "589102069083",
  appId: "1:589102069083:web:ada0fb358af2e11a13567e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged(function(user){

if(!user){
window.location="login.html";
}

});

function submitPayment(){

var user = firebase.auth().currentUser;

if(!user){
alert("Login required");
return;
}

db.collection("payments").add({
userEmail: user.email,
userId: user.uid,
status: "pending",
date: new Date().toISOString()
})

.then(function(){
alert("Payment Submitted Successfully!");
window.location="deshboard.html";;
})

.catch(function(error){
alert(error.message);
});

}

</script>

</body>
</html>
