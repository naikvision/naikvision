<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signup - NaikVision</title>

<style>
body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
padding-top:80px;
}

.box{
background:#1e293b;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

a{
color:#38bdf8;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Create Password">

<button onclick="signupUser()">Sign Up</button>

<br><br>
<a href="login.html">Already have account? Login</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDe-oB8EL9H6xO5c40FyM1Fo9MiRbEsCXM",
  authDomain: "naikvision-login.firebaseapp.com",
  projectId: "naikvision-login",
  storageBucket: "naikvision-login.appspot.com",
  messagingSenderId: "589102069083",
  appId: "1:589102069083:web:ada0fb358af2e11a13567e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function signupUser(){

var email = document.getElementById("email").value.trim();
var password = document.getElementById("password").value.trim();

if(email=="" || password==""){
alert("Please fill all fields");
return;
}

if(password.length < 6){
alert("Password must be at least 6 characters");
return;
}

firebase.auth().createUserWithEmailAndPassword(email,password)
.then(function(userCredential){

let user = userCredential.user;

// 🔥 Firestore me user save karo
db.collection("users").doc(user.uid).set({
email: user.email,
role: "free",
createdAt: new Date()
})

.then(function(){
alert("Signup Successful");
window.location="login.html";
});

})
.catch(function(error){
alert(error.message);
});

}

</script>

</body>
</html>
